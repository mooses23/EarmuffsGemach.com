name: Secret scan (Twilio SID + friends) (Task #182)

# Why this exists:
#   Task #180 cleaned a Twilio SMS-log CSV out of git history after it was
#   pulled in by a Replit auto-checkpoint of attached_assets/. The CSV
#   filename and body both contained the Twilio Account SID
#   (regex: AC[0-9a-fA-F]{32}) plus customer PII.
#
#   Task #182 (this workflow) makes sure the same class of leak cannot
#   silently slip through again, even if someone renames the file or
#   pastes the SID into an unrelated text file.
#
# What this does:
#   On every push and pull request, run ripgrep across the entire
#   checkout (excluding .git) looking for a Twilio Account SID.
#   If anything matches, fail the build and print the matches so the
#   committer sees exactly which file/line is leaking.
#
# How to react when this fails:
#   1. The SID is already in the working tree of that commit.
#   2. Rotate the Twilio Auth Token immediately
#      (Twilio Console -> Account -> API keys & tokens).
#   3. Scrub the file (see docs/sms-exports.md) and force-push a
#      cleaned history (or revert + filter-branch, whichever the
#      maintainer prefers). A normal "delete the line" follow-up
#      commit is NOT enough -- the SID stays in history.

on:
  push:
  pull_request:

jobs:
  scan:
    name: ripgrep for AC<32 hex>
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Full history is overkill for ripgrep on the working tree, and
          # would slow the workflow down on big repos. The default shallow
          # clone is what we want.
          fetch-depth: 1

      - name: Scan for Twilio Account SID
        shell: bash
        run: |
          set -euo pipefail
          # ripgrep is preinstalled on ubuntu-latest. -n shows line
          # numbers, -H shows filenames, --hidden walks dotfiles, and
          # -g '!.git' skips the git metadata. The regex is the literal
          # Twilio SID format: "AC" + 32 hex chars, with word boundaries
          # so a 33-char hash doesn't false-positive.
          if rg --hidden -n -H -g '!.git' -e '\bAC[0-9a-fA-F]{32}\b' .; then
            echo ""
            echo "::error::Found a Twilio Account SID (AC<32 hex>) in the tree."
            echo "See docs/sms-exports.md for the cleanup playbook."
            echo "Rotate the Twilio Auth Token before doing anything else."
            exit 1
          fi
          echo "No Twilio Account SID found. OK."
